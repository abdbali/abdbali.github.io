<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balı | Digital Card</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0a0a0a; perspective: 1000px; }
        
        .card {
            width: 320px; height: 450px;
            background: #161616;
            border-radius: 20px;
            border: 1px solid #333;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            cursor: grab;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #e0e0e0;
            padding: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .motto { font-size: 13px; font-style: italic; color: #888; margin-bottom: 20px; }
        .tag { background: #222; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin: 2px; display: inline-block; }
        .links { margin-top: 20px; }
        a { color: #fff; text-decoration: none; border-bottom: 1px solid #fff; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card" id="card">
        <h1>Balı</h1>
        <p class="motto">“Discover learning through technology and innovation.”</p>
        <div>
            <span class="tag">AI & Machine Learning</span>
            <span class="tag">Aerospace</span>
            <span class="tag">XR/VR</span>
            <span class="tag">Robotics</span>
        </div>
        <div class="links"><a href="https://www.youtube.com/@abdbali">YouTube Channel</a></div>
    </div>

    <script>
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
