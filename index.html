<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balı | Digital Card</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #1a2a24 0%, #050505 100%);
            font-family: 'Inter', sans-serif; overflow: hidden; perspective: 1000px;
        }
        /* Kart Stili */
        .card {
            width: 320px; height: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; color: white; transition: transform 0.2s ease-out;
            transform-style: preserve-3d; margin-bottom: 40px;
        }
        /* İkon Bar Stili */
        .social-bar {
            display: flex; gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon { width: 30px; height: 30px; fill: white; opacity: 0.7; transition: 0.3s; }
        .icon:hover { opacity: 1; transform: scale(1.1); }
        
        h1 { font-size: 28px; margin: 10px 0; }
        p { color: #aaa; font-size: 16px; margin: 0 0 20px; }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div style="width: 100px; height: 100px; border-radius: 50%; background: #333; margin-bottom: 20px;"></div>
        <h1>Balı</h1>
        <p>STEM & Vibe Coding</p>
    </div>

    <!-- Sosyal Medya İkonları (Glass) -->
    <div class="social-bar">
        <a href="https://www.youtube.com/@abdbali"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="icon"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384014.png" class="icon"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384015.png" class="icon"></a>
    </div>

    <script>
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
        window.addEventListener('deviceorientation', (e) => {
            card.style.transform = `rotateX(${e.beta}deg) rotateY(${e.gamma}deg)`;
        });
    </script>
</body>
</html>
